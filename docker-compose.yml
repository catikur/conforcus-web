# conforcus-web — Docker Compose projesi (CLAUDE.md mimarisi)
# Proje adı bilinçli olarak "conforcus-web" (Hostinger panel/MCP'de böyle görünür).
# Sunucuda aynı dizinde bir `.env` dosyası bulunmalı (bkz. .env.production.example).
name: conforcus-web

services:
  web:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - SANITY_PROJECT_ID=${SANITY_PROJECT_ID}
      - SANITY_DATASET=${SANITY_DATASET:-production}
      - SANITY_API_VERSION=${SANITY_API_VERSION:-2024-01-01}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - LEAD_TO=${LEAD_TO:-info@conforcus.com}
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data: {}
  caddy_config: {}
